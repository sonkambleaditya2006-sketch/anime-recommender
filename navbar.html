<!-- Ahh this error is very common 👍
👉 It simply means **Git is NOT installed on your system** (or not added to PATH)

---

# 🚫 Problem

`git is not recognized` = your PC doesn’t know what Git is

---

# ✅ Solution (Do this step-by-step)

## 🟢 Step 1: Install Git

1. Go to: Git official site
   👉 [https://git-scm.com](https://git-scm.com)

2. Click **Download for Windows**

---

## 🟢 Step 2: Install Properly

While installing:

* Keep clicking **Next**
* IMPORTANT:
  👉 Select **“Git from command line and also from 3rd-party software”**

(very important or same error will come again)

---

## 🟢 Step 3: Restart VS Code

After install:

* Close VS Code
* Open it again

---

## 🟢 Step 4: Check Git

In terminal:

```bash id="ds94ga"
git --version
```

👉 If installed correctly, it will show version like:

```
git version 2.xx.x
```

---

## 🟢 Step 5: Now Run Your Command

```bash id="7j1p0n"
git clone https://github.com/sonkambleaditya2006-sketch/anime-recommender.git
cd anime-recommender
code .
```

---

# 🧠 Simple Understanding

👉 No Git = no clone, no push, no project work
